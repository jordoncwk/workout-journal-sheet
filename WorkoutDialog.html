<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg-base: #0f1117;
    --bg-card: #161b27;
    --bg-input: #1e2535;
    --border: #2a3347;
    --text-primary: #f0f4ff;
    --text-secondary: #a0aec0;
    --accent: #06b6d4;
    --accent-dark: #0891b2;
    --success: #0d9488;
    --success-bg: rgba(13,148,136,0.15);
    --danger: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: var(--bg-base); color: var(--text-primary); }
  .header { background: var(--bg-card); color: var(--text-primary); padding: 14px 16px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 17px; font-weight: 600; flex: 1; }
  .timer { font-size: 15px; font-variant-numeric: tabular-nums; background: rgba(6,182,212,0.15); color: var(--accent); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(6,182,212,0.25); }
  .btn { padding: 12px 20px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-success { background: var(--success); color: white; }
  .btn-danger { background: var(--danger); color: white; }
  .btn-ghost { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); }
  .btn-sm { padding: 8px 14px; font-size: 13px; }
  .btn-full { width: 100%; margin-top: 8px; }
  .card { background: var(--bg-card); border-radius: 12px; margin: 10px; padding: 0; box-shadow: 0 1px 4px rgba(0,0,0,0.4); overflow: hidden; border: 1px solid var(--border); }
  .ex-header { display: flex; align-items: center; padding: 14px 16px; gap: 12px; }
  .ex-border { width: 4px; height: 40px; border-radius: 2px; flex-shrink: 0; }
  .ex-name { font-size: 16px; font-weight: 600; flex: 1; }
  .ex-body { padding: 0 16px 14px; }
  .best-weight { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; }
  .set-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .set-num { font-size: 13px; color: var(--text-secondary); width: 20px; }
  .set-input { flex: 1; border: 1px solid var(--border); border-radius: 8px; padding: 10px 8px; font-size: 16px; text-align: center; background: var(--bg-input); color: var(--text-primary); }
  .set-input:focus { border-color: var(--accent); outline: none; }
  .set-label { font-size: 11px; color: var(--text-secondary); text-align: center; }
  .set-logged { background: var(--success-bg) !important; color: #2dd4bf; font-weight: 600; border-color: var(--success) !important; }
  .log-set-btn { padding: 10px 14px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .log-set-btn.logged { background: var(--success); }
  .next-btn { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .add-ex-row { display: flex; gap: 8px; margin: 8px 10px; }
  .add-ex-row input { flex: 1; border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-size: 15px; background: var(--bg-input); color: var(--text-primary); }
  .finish-area { padding: 16px; }
  .rest-banner { display: none; background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 10px 16px; align-items: center; gap: 12px; }
  .rest-banner.active { display: flex; }
  .rest-label { font-size: 13px; color: var(--text-secondary); }
  .rest-countdown { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--accent); min-width: 48px; text-align: center; }
  .rest-countdown.done { color: var(--success); }
  .rest-dismiss { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; }
  .rest-bar-track { flex: 1; height: 4px; background: var(--bg-input); border-radius: 2px; overflow: hidden; }
  .rest-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 1s linear; width: 100%; }
  .summary-stat { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 16px; }
  .summary-stat:last-child { border-bottom: none; }
  .summary-val { font-weight: 700; color: var(--accent); }
  select { width: 100%; padding: 14px; font-size: 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-input); color: var(--text-primary); }
  #loading { text-align: center; padding: 60px; color: var(--text-secondary); }
  .view { display: none; }
</style>
</head>
<body>

<div id="loading">Loading...</div>

<!-- Template selection -->
<div id="select-view" class="view">
  <div class="header"><h1>Start Workout</h1></div>
  <div style="padding:16px;">
    <div style="font-size:14px;color:var(--text-secondary);margin-bottom:8px;">Choose a template</div>
    <select id="template-select"></select>
    <button class="btn btn-primary btn-full" style="margin-top:16px;" onclick="startWorkout()">Start</button>
  </div>
</div>

<!-- Resume prompt -->
<div id="resume-view" class="view">
  <div class="header"><h1>Resume Workout?</h1></div>
  <div style="padding:16px;">
    <div class="card" style="padding:16px;">
      <p style="font-size:15px;margin-bottom:16px;">You have an unfinished workout. Resume it or start fresh?</p>
      <button class="btn btn-primary btn-full" onclick="resumeWorkout()">Resume</button>
      <button class="btn btn-ghost btn-full" style="margin-top:8px;" onclick="discardAndShowSelect()">Discard &amp; Start New</button>
    </div>
  </div>
</div>

<!-- Active workout -->
<div id="workout-view" class="view">
  <div class="header">
    <h1 id="workout-title">Workout</h1>
    <div class="timer" id="timer">0:00</div>
  </div>
  <div class="rest-banner" id="rest-banner">
    <div class="rest-label">Rest</div>
    <div class="rest-bar-track"><div class="rest-bar-fill" id="rest-bar"></div></div>
    <div class="rest-countdown" id="rest-countdown">2:00</div>
    <button class="rest-dismiss" onclick="stopRestTimer()">Done</button>
  </div>
  <div id="exercises-container"></div>
  <div class="add-ex-row">
    <input type="text" id="add-ex-input" placeholder="Add exercise...">
    <button class="btn btn-ghost btn-sm" onclick="addFreeformExercise()">Add</button>
  </div>
  <div class="finish-area">
    <button class="btn btn-danger btn-full" onclick="finishWorkout()">Finish Workout</button>
  </div>
</div>

<!-- Summary -->
<div id="summary-view" class="view">
  <div class="header"><h1>Workout Complete</h1></div>
  <div style="padding:16px;">
    <div class="card" style="padding:16px;">
      <div class="summary-stat"><span>Duration</span><span class="summary-val" id="s-duration">-</span></div>
      <div class="summary-stat"><span>Exercises</span><span class="summary-val" id="s-exercises">-</span></div>
      <div class="summary-stat"><span>Total Sets</span><span class="summary-val" id="s-sets">-</span></div>
      <div class="summary-stat"><span>Total Volume</span><span class="summary-val" id="s-volume">-</span></div>
    </div>
    <button class="btn btn-primary btn-full" style="margin-top:16px;" onclick="google.script.host.close()">Done</button>
  </div>
</div>

<script>
let state = null; // { templateId, templateName, startedAt, exercises, currentExerciseIndex }
let timerInterval = null;
let bestWeightCache = {};
let restInterval = null;
const REST_DURATION = 120; // seconds

function startRestTimer() {
  if (restInterval) clearInterval(restInterval);
  let remaining = REST_DURATION;
  const banner = document.getElementById('rest-banner');
  const countdown = document.getElementById('rest-countdown');
  const bar = document.getElementById('rest-bar');
  banner.classList.add('active');
  countdown.classList.remove('done');
  bar.style.transition = 'none';
  bar.style.width = '100%';
  // force reflow so transition applies from 100%
  bar.offsetWidth;
  bar.style.transition = `width ${REST_DURATION}s linear`;
  bar.style.width = '0%';
  function tick() {
    remaining--;
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    countdown.textContent = m + ':' + String(s).padStart(2, '0');
    if (remaining <= 0) {
      clearInterval(restInterval);
      restInterval = null;
      countdown.classList.add('done');
      countdown.textContent = 'Go!';
    }
  }
  countdown.textContent = '2:00';
  restInterval = setInterval(tick, 1000);
}

function stopRestTimer() {
  if (restInterval) { clearInterval(restInterval); restInterval = null; }
  document.getElementById('rest-banner').classList.remove('active');
  const countdown = document.getElementById('rest-countdown');
  countdown.classList.remove('done');
  countdown.textContent = '2:00';
  const bar = document.getElementById('rest-bar');
  bar.style.transition = 'none';
  bar.style.width = '100%';
}

function showView(id) {
  ['loading','select-view','resume-view','workout-view','summary-view'].forEach(v => {
    document.getElementById(v).style.display = v === id ? 'block' : 'none';
  });
  document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
  const el = document.getElementById(id);
  if (el) el.style.display = 'block';
  document.getElementById('loading').style.display = id === 'loading' ? 'block' : 'none';
}

function init() {
  showView('loading');
  google.script.run
    .withSuccessHandler(function(data) {
      const select = document.getElementById('template-select');
      select.innerHTML = '<option value="">Free-form</option>';
      data.templates.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.id;
        opt.textContent = t.name;
        opt.dataset.exercises = JSON.stringify(t.exercises);
        select.appendChild(opt);
      });

      if (data.activeWorkout) {
        state = data.activeWorkout;
        showView('resume-view');
      } else {
        showView('select-view');
      }
    })
    .withFailureHandler(function(e) { alert('Error: ' + e.message); })
    .getWorkoutInitialData();
}

function startWorkout() {
  const select = document.getElementById('template-select');
  const templateId = select.value ? parseInt(select.value) : null;
  const templateName = select.value ? select.options[select.selectedIndex].text : 'Free-form';
  const exercises = select.value ? JSON.parse(select.options[select.selectedIndex].dataset.exercises) : [];

  google.script.run
    .withSuccessHandler(function(s) {
      state = s;
      loadBestWeights(function() { renderWorkout(); });
    })
    .withFailureHandler(function(e) { alert('Error: ' + e.message); })
    .startWorkout(templateId, templateName, exercises);
}

function resumeWorkout() {
  loadBestWeights(function() { renderWorkout(); });
}

function discardAndShowSelect() {
  google.script.run.withSuccessHandler(function() {
    state = null;
    showView('select-view');
  }).discardActiveWorkout();
}

function loadBestWeights(cb) {
  const names = [...new Set(state.exercises.map(e => e.exercise_name))];
  let remaining = names.length;
  if (remaining === 0) { cb(); return; }
  names.forEach(name => {
    google.script.run
      .withSuccessHandler(function(weight) {
        bestWeightCache[name] = weight;
        if (--remaining === 0) cb();
      })
      .withFailureHandler(function() {
        if (--remaining === 0) cb();
      })
      .getBestWeightForExercise(name);
  });
}

function renderWorkout() {
  showView('workout-view');
  document.getElementById('workout-title').textContent = state.templateName || 'Workout';
  startTimer();
  renderExercises();
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(function() {
    const elapsed = Math.floor((Date.now() - state.startedAt) / 1000);
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    document.getElementById('timer').textContent = m + ':' + String(s).padStart(2, '0');
  }, 1000);
}

function renderExercises() {
  const container = document.getElementById('exercises-container');
  const idx = state.currentExerciseIndex;
  container.innerHTML = state.exercises.map((ex, i) => {
    const isActive = i === idx;
    const isDone = i < idx;
    const borderColor = isDone ? '#0d9488' : isActive ? '#06b6d4' : '#2a3347';
    let html = `<div class="card"><div class="ex-header">
      <div class="ex-border" style="background:${borderColor}"></div>
      <div class="ex-name">${ex.exercise_name}</div>
      ${!isActive && !isDone ? `<button class="btn btn-ghost btn-sm" onclick="jumpToExercise(${i})">Go</button>` : ''}
      ${isDone ? '<span style="color:#0d9488;font-size:18px;">✓</span>' : ''}
    </div>`;

    if (isActive) {
      const best = bestWeightCache[ex.exercise_name];
      html += `<div class="ex-body">`;
      if (best !== null && best !== undefined) {
        html += `<div class="best-weight">Previous best: ${best} kg</div>`;
      }
      html += `<div style="display:flex;gap:8px;margin-bottom:4px;">
        <div style="width:20px"></div>
        <div class="set-label" style="flex:1">Weight (kg)</div>
        <div class="set-label" style="flex:1">Reps</div>
        <div style="width:60px"></div>
      </div>`;
      ex.sets.forEach((set, si) => {
        html += `<div class="set-row">
          <div class="set-num">${si+1}</div>
          <input class="set-input ${set.logged?'set-logged':''}" type="number" step="0.5" value="${set.weight_kg}"
            oninput="updateSet(${i},${si},'weight_kg',this.value)" placeholder="0" ${set.logged?'readonly':''}>
          <input class="set-input ${set.logged?'set-logged':''}" type="number" value="${set.reps}"
            oninput="updateSet(${i},${si},'reps',this.value)" placeholder="0" ${set.logged?'readonly':''}>
          <button class="log-set-btn ${set.logged?'logged':''}" onclick="toggleLogSet(${i},${si})">
            ${set.logged ? '✓' : 'Log'}
          </button>
        </div>`;
      });
      html += `<button class="btn btn-ghost btn-full btn-sm" onclick="addSet(${i})">+ Add Set</button>`;
      html += `<button class="btn btn-ghost btn-full btn-sm" style="margin-top:8px;" onclick="startRestTimer()">⏱ Rest Timer (2 min)</button>`;
      html += `<button class="btn btn-primary btn-full" style="margin-top:10px;" onclick="nextExercise()">Next Exercise →</button>`;
      html += `</div>`;
    }
    html += `</div>`;
    return html;
  }).join('');
}

function updateSet(exIdx, setIdx, field, value) {
  state.exercises[exIdx].sets[setIdx][field] = value;
}

function toggleLogSet(exIdx, setIdx) {
  const set = state.exercises[exIdx].sets[setIdx];
  set.logged = !set.logged;
  google.script.run.saveActiveWorkoutState(state);
  renderExercises();
}

function addSet(exIdx) {
  state.exercises[exIdx].sets.push({ weight_kg: '', reps: '', logged: false });
  renderExercises();
}

function nextExercise() {
  if (state.currentExerciseIndex < state.exercises.length - 1) {
    state.currentExerciseIndex++;
  }
  google.script.run.saveActiveWorkoutState(state);
  renderExercises();
}

function jumpToExercise(i) {
  state.currentExerciseIndex = i;
  renderExercises();
}

function addFreeformExercise() {
  const input = document.getElementById('add-ex-input');
  const name = input.value.trim();
  if (!name) return;
  state.exercises.push({ exercise_name: name, sets: [{ weight_kg: '', reps: '', logged: false }] });
  state.currentExerciseIndex = state.exercises.length - 1;
  input.value = '';
  bestWeightCache[name] = null;
  google.script.run.withSuccessHandler(function(w) {
    bestWeightCache[name] = w;
    renderExercises();
  }).getBestWeightForExercise(name);
  renderExercises();
}

function finishWorkout() {
  if (!confirm('Finish this workout?')) return;
  if (timerInterval) clearInterval(timerInterval);
  google.script.run
    .withSuccessHandler(function(summary) {
      document.getElementById('s-duration').textContent = formatDuration(summary.duration);
      document.getElementById('s-exercises').textContent = summary.exerciseCount;
      document.getElementById('s-sets').textContent = summary.setCount;
      document.getElementById('s-volume').textContent = summary.totalVolume + ' kg';
      showView('summary-view');
    })
    .withFailureHandler(function(e) { alert('Error: ' + e.message); })
    .finishWorkout(state);
}

function formatDuration(ms) {
  const total = Math.floor(ms / 1000);
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m ${s}s`;
}

init();
</script>
</body>
</html>
